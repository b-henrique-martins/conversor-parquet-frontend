<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor Parquet ↔ CSV</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">⇄</span>
          <div>
            <h1>Conversor de dados</h1>
            <p class="subtitle">Parquet ↔ CSV, sem limite prático de tamanho</p>
          </div>
        </div>
      </header>

      <nav class="tabs" role="tablist">
        <button
          class="tab-btn active"
          id="tab-convert"
          type="button"
          role="tab"
          aria-selected="true"
        >
          Converter
        </button>
        <button
          class="tab-btn"
          id="tab-view"
          type="button"
          role="tab"
          aria-selected="false"
        >
          Visualizar
        </button>
      </nav>

      <main class="panel section" id="section-convert">
        <div class="dropzone" id="dropzone">
          <input type="file" id="file-input" accept=".parquet,.csv" hidden />
          <div class="dropzone-content">
            <span class="dropzone-icon">↑</span>
            <p>
              <strong>Clique</strong> ou arraste um arquivo .parquet ou .csv
            </p>
            <p id="file-name" class="file-name"></p>
          </div>
        </div>

        <div class="field direction-field">
          <label for="direction">Direção da conversão</label>
          <select id="direction">
            <option value="parquet_to_csv">Parquet → CSV</option>
            <option value="csv_to_parquet">CSV → Parquet</option>
          </select>
        </div>

        <button
          id="convert-btn"
          class="btn-primary btn-large"
          type="button"
          disabled
        >
          Converter
        </button>

        <div id="progress-area" class="progress-area hidden">
          <div class="progress-row">
            <span id="progress-label">Enviando arquivo…</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>

        <div id="result-area" class="result-area hidden"></div>
      </main>

      <main class="panel section hidden" id="section-view">
        <div class="dropzone" id="view-dropzone">
          <input
            type="file"
            id="view-file-input"
            accept=".parquet,.csv"
            hidden
          />
          <div class="dropzone-content">
            <span class="dropzone-icon">👁</span>
            <p>
              <strong>Clique</strong> ou arraste um arquivo .parquet ou .csv
            </p>
            <p id="view-file-name" class="file-name"></p>
          </div>
        </div>

        <button
          id="view-btn"
          class="btn-primary btn-large"
          type="button"
          disabled
        >
          Visualizar
        </button>

        <div id="view-progress-area" class="progress-area hidden">
          <div class="progress-row">
            <span id="view-progress-label">Enviando arquivo…</span>
            <span id="view-progress-pct">0%</span>
          </div>
          <div class="progress-bar">
            <div id="view-progress-fill" class="progress-fill"></div>
          </div>
        </div>

        <div id="view-result" class="preview-inline hidden"></div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
